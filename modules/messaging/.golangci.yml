version: "2"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  default: all

  disable:
    - dupl
    - err113
    - exhaustruct
    - godot
    - gomoddirectives
    - iface
    - ireturn
    - lll
    - mnd
    - nlreturn
    - nonamedreturns
    - revive
    - tagliatelle
    - testpackage
    - varnamelen
    - whitespace
    - wsl
    - wsl_v5

  settings:
    depguard:
      rules:
        main:
          list-mode: original
          deny:
            # ------------------------------------------------------------------------
            # LOGGING
            # ------------------------------------------------------------------------
            - pkg: "^log$"
              desc: "use log/slog instead of stdlib log"
            - pkg: "github.com/sirupsen/logrus"
              desc: "use log/slog instead of logrus"
            - pkg: "go.uber.org/zap"
              desc: "use log/slog instead of zap"
            - pkg: "github.com/rs/zerolog"
              desc: "use log/slog instead of zerolog"

            # ------------------------------------------------------------------------
            # TESTING
            # ------------------------------------------------------------------------
            - pkg: "github.com/stretchr/testify"
              desc: "use t.Fatal/t.Fatalf instead of testify assertions"

            # ------------------------------------------------------------------------
            # LEGACY ERRORS
            # ------------------------------------------------------------------------
            - pkg: "github.com/pkg/errors"
              desc: "use errs.Wrap(sentinel, err) with a sentinel from errors.go"

            # ------------------------------------------------------------------------
            # DEPRECATED IO
            # ------------------------------------------------------------------------
            - pkg: "io/ioutil"
              desc: "ioutil is deprecated since Go 1.16"

            # ------------------------------------------------------------------------
            # BANNED DEPENDENCIES
            # ------------------------------------------------------------------------
            - pkg: "github.com/spf13/viper"
              desc: "viper is not allowed in integration module"

    forbidigo:
      forbid:
        - pattern: ^(fmt\.Print(|f|ln)|fmt\.Fprint(|f|ln)|print|println)$
          msg: "use the project logger (log/slog) instead of direct print statements"

    funlen:
      lines: 220

    exhaustive:
      default-signifies-exhaustive: true

  exclusions:
    rules:
      # Exclude some linters from running on tests files.
      - path: _test\.go
        linters:
          - cyclop
          - errcheck
          - errchkjson
          - errname
          - forbidigo
          - containedctx
          - funlen
          - gocognit
          - gocyclo
          - gosec
          - maintidx
          - noctx
          - wrapcheck
          - forcetypeassert
      # type compliance vars are package-level by design
      - path: types\.go
        linters:
          - gochecknoglobals
      # router.go / bridge.go: cassert.NotNil guards the receiver
      # invariant on lifecycle methods; contextcheck false positive.
      # wrapcheck: Stop wraps ctx.Err with lifecycle.ErrShutdown —
      # that is the domain factory, additional wrapping adds no value.
      - path: router/router\.go
        linters:
          - contextcheck
          - wrapcheck
      - path: bridge/bridge\.go
        linters:
          - contextcheck
          - wrapcheck
      - path: filter/filter\.go
        linters:
          - contextcheck
          - wrapcheck
      # idempotent/idempotent.go and claimcheck/claimcheck.go follow the
      # same shape as router/filter/bridge: cassert.NotNil guards the
      # receiver invariant on every method (contextcheck false positive),
      # and Stop wraps ctx.Err with lifecycle.ErrShutdown — the domain
      # factory, additional wrapping adds no value.
      - path: idempotent/idempotent\.go
        linters:
          - contextcheck
          - wrapcheck
      - path: claimcheck/claimcheck\.go
        linters:
          - contextcheck
          - wrapcheck
      - path: controlbus/controlbus\.go
        linters:
          - contextcheck
          - wrapcheck
      - path: gateway/gateway\.go
      - path: transformer/transformer\.go
        linters:
          - contextcheck
          - wrapcheck
      - path: wiretap/wiretap\.go
        linters:
          - contextcheck
          - wrapcheck
      - path: splitter/splitter\.go
      # channel_pollable / channel_scheduled: same cassert.NotNil
      # receiver-guard pattern as channel_topic / channel_queue
      # (contextcheck false positive); channel_scheduled.Stop also
      # wraps ctx.Err via the lifecycle.ErrShutdown factory.
      # containedctx covers two private structs (scheduled itself
      # and scheduledItem) that intentionally carry sendCtx and
      # workerCtx so the dispatcher can merge them later — same
      # design choice as envelope[T] in context.go.
      - path: channel_pollable\.go
        linters:
          - contextcheck
      - path: channel_scheduled\.go
        linters:
          - contextcheck
          - wrapcheck
          - containedctx
      # delayer / pollingconsumer: same cassert.NotNil receiver-guard
      # pattern (contextcheck false positive). delayer.Stop wraps ctx.Err
      # via the lifecycle.ErrShutdown factory and bubbles internal
      # ScheduledChannel.Stop errors unchanged (wrapping them again
      # would double-wrap an already-typed messaging error). delayer
      # carries an internalLifecycle field that holds a Component
      # reference for its embedded ScheduledChannel; that's deliberate
      # composition, not stored context.
      - path: delayer/delayer\.go
        linters:
          - contextcheck
          - wrapcheck
      - path: pollingconsumer/pollingconsumer\.go
        linters:
          - contextcheck
          - wrapcheck
          - containedctx
      - path: aggregator/aggregator\.go
        linters:
          - contextcheck
          - wrapcheck
      - path: recipientlist/recipientlist\.go
        linters:
          - contextcheck
          - wrapcheck
      - path: headerfilter/headerfilter\.go
        linters:
          - contextcheck
          - wrapcheck
      - path: enricher/enricher\.go
        linters:
          - contextcheck
          - wrapcheck
      - path: scattergather/scattergather\.go
      # store/{message,metadata}store.go: cassert.NotNil guards the
      # receiver invariant on every method; contextcheck false positive
      # on the assert call. wrapcheck: Stop wraps ctx.Err with
      # lifecycle.ErrShutdown — that is the domain factory, additional
      # wrapping adds no value.
      - path: store/messagestore\.go
        linters:
          - contextcheck
      - path: store/metadatastore\.go
        linters:
          - contextcheck
          - wrapcheck
