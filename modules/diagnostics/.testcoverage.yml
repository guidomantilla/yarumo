# (mandatory)
# Path to coverprofile file (output of `go test -coverprofile` command).
profile: .reports/testcoverage.out

# (optional; but recommended to set)
# When specified, reported file paths will not contain local prefix in the output
local-prefix: "github.com/guidomantilla/yarumo/diagnostics"

# Holds coverage thresholds percentages, values should be in range [0-100]
threshold:
  # (optional; default 0)
  # The minimum coverage that each file should have.
  # Lowered slightly because blockprof.go and tracefr.go exercise
  # process-global side effects (runtime.SetBlockProfileRate,
  # runtime/trace.FlightRecorder.Start) that cannot all be hit cleanly in
  # parallel unit tests, and internals.go has defensive branches
  # (pprof.Lookup unknown name, profile.WriteTo error) that the public
  # API never triggers under normal pprof registration.
  file: 75

  # (optional; default 0)
  # The minimum coverage that each package should have.
  # Lowered to 75 to accommodate internals.go (77.8%) — its two
  # untested arms are defensive (unknown profile name and WriteTo error
  # on a valid profile) and cannot be exercised without mocking the
  # runtime/pprof registry.
  package: 75

  # (optional; default 0)
  # The minimum total coverage a project should have
  total: 85
