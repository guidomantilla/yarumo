# (mandatory)
# Path to coverprofile file (output of `go test -coverprofile` command).
profile: .reports/testcoverage.out

# (optional; but recommended to set)
# When specified, reported file paths will not contain local prefix in the output.
local-prefix: "github.com/guidomantilla/yarumo/core/crypto"

# Holds coverage thresholds percentages, values should be in range [0-100]
threshold:
  # (optional; default 0)
  # The minimum coverage that each file should have.
  file: 90

  # (optional; default 0)
  # The minimum coverage that each package should have.
  package: 90

  # (optional; default 0)
  # The minimum total coverage a project should have.
  total: 99

# Holds regexp rules which will override thresholds for matched files or packages
# using their paths.
override:
  # ciphers/hybrid/functions.go wraps circl/hpke; the uncovered branches are
  # error paths from third-party APIs (KEM scheme errors, rand.Reader failures,
  # NewSender/NewReceiver returning nil error in the current circl release)
  # that are not reachable from unit tests without forking the dependency.
  - threshold: 85
    path: ^ciphers/hybrid/functions\.go$

# Holds regexp rules which will exclude matched files or packages
# from coverage statistics.
exclude:
  paths:
    - ^certs/examples/main.go
    - ^ciphers/examples/main.go
    - ^ciphers/hybrid/examples/main.go
    - ^hashes/examples/main.go
    - ^kdfs/examples/main.go
    - ^passwords/examples/main.go
    - ^signers/examples/main.go
    - ^tokens/examples/main.go

# NOTES:
# - symbol `/` in all path regexps will be replaced by the current OS file path separator
#   to properly work on Windows.
