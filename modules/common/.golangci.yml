version: "2"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  default: all

  disable:
    - err113
    - exhaustruct
    - godot
    - lll
    - mnd
    - nlreturn
    - revive
    - tagliatelle
    - testpackage
    - varnamelen
    - whitespace
    - wsl
    - wsl_v5

  settings:
    depguard:
      rules:
        main:
          list-mode: original
          deny:
            # ------------------------------------------------------------------------
            # LOGGING
            # ------------------------------------------------------------------------
            - pkg: "^log$"
              desc: "use log/slog instead of stdlib log"
            - pkg: "github.com/sirupsen/logrus"
              desc: "use log/slog instead of logrus"
            - pkg: "go.uber.org/zap"
              desc: "use log/slog instead of zap"
            - pkg: "github.com/rs/zerolog"
              desc: "use log/slog instead of zerolog"

            # ------------------------------------------------------------------------
            # INSECURE CRYPTO
            # ------------------------------------------------------------------------
            - pkg: "crypto/md5"
              desc: "crypto/md5 is insecure. use crypto/sha256"
            - pkg: "crypto/sha1"
              desc: "crypto/sha1 is insecure. use crypto/sha256"
            - pkg: "crypto/des"
              desc: "crypto/des is insecure (56-bit key). use crypto/aes"
            - pkg: "crypto/rc4"
              desc: "crypto/rc4 is broken. use crypto/aes"

            # ------------------------------------------------------------------------
            # INSECURE RAND
            # ------------------------------------------------------------------------
            - pkg: "^math/rand$"
              desc: "use math/rand/v2 or crypto/rand instead"

            # ------------------------------------------------------------------------
            # DEPRECATED IO
            # ------------------------------------------------------------------------
            - pkg: "io/ioutil"
              desc: "ioutil is deprecated since Go 1.16"

            # ------------------------------------------------------------------------
            # LEGACY ERRORS
            # ------------------------------------------------------------------------
            - pkg: "github.com/pkg/errors"
              desc: "use errs.Wrap(sentinel, err) with a sentinel from errors.go"

            # ------------------------------------------------------------------------
            # OLD LIBRARIES
            # ------------------------------------------------------------------------
            - pkg: "github.com/mitchellh/mapstructure"
              desc: "avoid untyped mapping; prefer typed structs + json"
            - pkg: "github.com/bitly/go-simplejson"
              desc: "avoid dynamic JSON; use encoding/json or gjson"
            - pkg: "github.com/dgrijalva/jwt-go"
              desc: "abandoned; use github.com/golang-jwt/jwt instead"

            # ------------------------------------------------------------------------
            # FORBIDDEN PACKAGES
            # ------------------------------------------------------------------------
            - pkg: "net/http/pprof"
              desc: "pprof should not be imported directly except in tools"
            - pkg: "runtime/pprof"
              desc: "prevent accidental CPU profiling in production code"
            - pkg: "runtime/debug"
              desc: "do not use ReadBuildInfo, SetGCPercent, etc. in prod"
            - pkg: unsafe
              desc: "unsafe must not be used outside low-level internal packages"

            # ------------------------------------------------------------------------
            # AVOID XML / GOB
            # ------------------------------------------------------------------------
            - pkg: encoding/xml
              desc: "avoid XML if possible; prefer JSON or protobuf"
            - pkg: encoding/gob
              desc: "gob is insecure and non-portable; avoid using it"

            # ------------------------------------------------------------------------
            # CONFIGURATION
            # ------------------------------------------------------------------------
            - pkg: "github.com/spf13/viper"
              desc: "use centralized configuration (config module) instead of viper directly"

            # ------------------------------------------------------------------------
            # TESTING
            # ------------------------------------------------------------------------
            - pkg: "github.com/stretchr/testify"
              desc: "use t.Fatal/t.Fatalf instead of testify assertions"

            # ------------------------------------------------------------------------
            # DEPRECATED PROTOBUF
            # ------------------------------------------------------------------------
            - pkg: "github.com/golang/protobuf"
              desc: "use google.golang.org/protobuf instead (v1 API is deprecated)"

            # ------------------------------------------------------------------------
            # SYSTEM / DEBUG
            # ------------------------------------------------------------------------
            - pkg: debug/elf
              desc: "debug/elf should not be used outside tools"
            - pkg: debug/macho
              desc: "debug/macho should not be used outside tools"

    forbidigo:
      forbid:
        - pattern: ^(fmt\.Print(|f|ln)|fmt\.Fprint(|f|ln)|print|println)$
          msg: "use the project logger (log/slog) instead of direct print statements"
        - pattern: ^(os\.(Getenv|LookupEnv|Setenv|Unsetenv|ExpandEnv)|syscall\.Getenv)$
          msg: "use centralized configuration instead of direct env access"
        - pattern: ^fmt\.Errorf$
          msg: "use errs.Wrap(sentinel, err) with a sentinel from errors.go instead of fmt.Errorf"

    funlen:
      lines: 220

    exhaustive:
      default-signifies-exhaustive: true

    ireturn:
      allow:
        - anon
        - error
        - empty
        - stdlib
        - generic
        - github\.com/guidomantilla/yarumo/common/expressions\.Evaluator
        - github\.com/guidomantilla/yarumo/common/expressions\.Expr
        - github\.com/guidomantilla/yarumo/common/cron\.Scheduler
        - github\.com/guidomantilla/yarumo/common/diagnostics\.TraceFlightRecorder
        - github\.com/guidomantilla/yarumo/common/http\.Client
        - github\.com/guidomantilla/yarumo/common/resilience\.(CircuitBreaker|CircuitBreakerRegistry|RateLimiter|RateLimiterRegistry)
        - github\.com/guidomantilla/yarumo/common/uids\.UID
        - github\.com/guidomantilla/yarumo/common/cache\.Cache

  exclusions:
    rules:
      # Exclude some linters from running on tests files.
      - path: _test\.go
        linters:
          - cyclop
          - dupl
          - errcheck
          - errchkjson
          - errname
          - forbidigo
          - containedctx
          - funlen
          - gocognit
          - gocyclo
          - maintidx
          - wrapcheck
          - forcetypeassert
      # errs/functions.go uses type switches on error interfaces intentionally;
      # errors.As would traverse the chain and break cycle detection.
      # cyclop: AsErrorInfo walk closure is 11 (limit 10); further extraction hurts readability.
      - path: errs/functions\.go
        linters:
          - cyclop
          - errorlint
      # math/rand/v2 is acceptable for non-security purposes (random strings, shuffle)
      - path: utils/functions\.go
        linters:
          - gosec
      # cast package is a thin delegation layer; wrapping errors adds no value
      - path: cast/functions\.go
        linters:
          - wrapcheck
      # crypto/random: randInt/randRead package-level vars are required for
      # testing crypto/rand error paths.
      - path: crypto/random/functions\.go
        linters:
          - gochecknoglobals
      # crypto/random: TestNumber and TestString cannot be parallel — they mock
      # the package-level randInt.
      - path: crypto/random/functions_test\.go
        linters:
          - paralleltest
          - tparallel
      # random (fast, math/rand/v2-backed): gosec G404 fires by design — this
      # package is the non-secure variant of crypto/random. Misuse is guarded
      # by the import path and the per-function doc warnings.
      - path: random/functions\.go
        linters:
          - gosec
      # log package globals (current, internal) are required for thread-safe singleton logger
      - path: log/internals\.go
        linters:
          - gochecknoglobals
          - ireturn
      # crypto/tokens/tokens.go: signingMethodFor must return the jwt.SigningMethod
      # interface from the backend library; that is the entire point of the helper
      # so callers do not see jwt types. ireturn would force returning a concrete
      # type from a third-party package, defeating the abstraction.
      # cyclop: signingMethodFor is a flat enum mapping over 13 Algorithm values
      # (HS256/384/512 + RS256/384/512 + PS256/384/512 + ES256/384/512 + EdDSA).
      # Each case is a single return; extraction into table-driven dispatch hurts
      # readability without reducing real complexity.
      - path: crypto/tokens/tokens\.go
        linters:
          - ireturn
          - cyclop
      # crypto/ciphers/hybrid: HPKE Method.GenerateKey and the internal
      # generateKey helper return kem.PublicKey / kem.PrivateKey from circl —
      # those are interfaces by design (one Method can serve multiple KEMs
      # over time). Returning the concrete X25519 types would re-leak circl
      # internals and break the polymorphism the abstraction is built on.
      - path: crypto/ciphers/hybrid/(functions|hybrid)\.go
        linters:
          - ireturn
      # log/slog globals are required for the default logger singleton
      - path: log/slog/logger\.go
        linters:
          - gochecknoglobals
      # fanout handler single-path returns error directly from interface method
      - path: log/slog/handler_fanout\.go
        linters:
          - wrapcheck
      # context handler delegates directly to the inner slog.Handler; wrapping
      # the error here would obscure the underlying handler's diagnostics
      - path: log/slog/handler_context\.go
        linters:
          - wrapcheck
      # tracefr delegates directly to trace.FlightRecorder; wrapping errors adds no value
      - path: diagnostics/trace\.go
        linters:
          - wrapcheck
      # lifecycle tests cannot be parallel: only one trace.FlightRecorder can be active per process
      - path: diagnostics/trace_test\.go
        linters:
          - paralleltest
      # assert enabled atomic.Bool is required for runtime assertion toggling
      # assert creates errors for logging, never returns them as domain errors
      - path: assert/functions\.go
        linters:
          - gochecknoglobals
          - forbidigo
      # assert tests cannot be parallel: they modify global enabled flag and global logger
      - path: assert/functions_test\.go
        linters:
          - paralleltest
      # log/functions_test and log/slog/logger_test cannot be parallel: they mock global state
      - path: log/functions_test\.go
        linters:
          - paralleltest
      - path: log/slog/logger_test\.go
        linters:
          - paralleltest
      # uids package-level singletons and registry are required for preconfigured defaults
      - path: uids/(uids|extensions)\.go
        linters:
          - gochecknoglobals
      # health/health.go: NewHealth follows criterion 4 (constructor returns
      # interface — Health is a public abstraction with a private impl).
      # cassert.NotNil does not accept context; runProbes receives ctx but the
      # assert guards the receiver.
      - path: health/health\.go
        linters:
          - ireturn
          - contextcheck
          - tparallel
      # health examples use fmt.Print* for demonstration purposes
      - path: health/examples/
        linters:
          - forbidigo
      # uids/extensions.go: Generate delegates to the current UID.Generate; the
      # wrapping happens inside the predefined generators (uids/functions.go).
      # uids/functions.go: external library errors are wrapped with ErrGenerationFailed
      # via cerrs.Wrap; wrapcheck does not detect Join-style wrapping.
      - path: uids/(extensions|functions)\.go
        linters:
          - wrapcheck
      # extensions_test.go cannot be parallel: tests modify the global methods registry
      - path: uids/extensions_test\.go
        linters:
          - paralleltest
      # cache package-level registry (caches map) and the preconfigured
      # INMEMORY_CACHE singleton (declared in cache.go) are required for the
      # default-and-register pattern.
      - path: cache/(cache|extensions)\.go
        linters:
          - gochecknoglobals
      # cache: cassert.NotNil does not accept context; the methods receive ctx but
      # the assert guards the receiver. Facade and registry delegate to the Cache
      # interface; wrapping errors at the facade level would obscure the
      # underlying cache's diagnostics.
      - path: cache/(cache|functions|extensions)\.go
        linters:
          - contextcheck
          - wrapcheck
      # cache/codec.go returns encoding/json errors directly; backends that
      # use the Codec are responsible for wrapping them with their own
      # domain errors at the call site.
      - path: cache/codec\.go
        linters:
          - wrapcheck
      # cache facade and registry tests cannot be parallel: they mutate the
      # global caches map (extensions_test.go) and the package-level
      # INMEMORY_CACHE contents (functions_test.go).
      - path: cache/(functions|extensions)_test\.go
        linters:
          - paralleltest
      # errors.go files define factory functions that may use fmt.Errorf for contextual messages
      - path: errors\.go
        linters:
          - forbidigo
      # assert.NotNil does not accept context; Build receives ctx but the assert guards the receiver
      - path: rest/specs\.go
        linters:
          - contextcheck
      # crypto subpackage globals: predefined methods, registry map, sync mutex, sentinel errors
      - path: crypto/
        linters:
          - gochecknoglobals
      # crypto/hashes is the legitimate registration point for legacy hash drivers
      # (crypto/sha1, crypto/md5). These imports are required so callers can opt
      # into legacy interop without each importing the stdlib drivers themselves.
      - path: crypto/hashes/extensions\.go
        linters:
          - depguard
          - gosec
      # crypto examples use println for demonstration purposes
      - path: crypto/.*/examples/
        linters:
          - forbidigo
      # crypto/hashes examples demonstrate legacy hashes (SHA1) marked Deprecated by design;
      # staticcheck SA1019 fires correctly for consumers but the demo itself is intentional.
      - path: crypto/hashes/examples/
        linters:
          - staticcheck
      # crypto private functions return errors that are wrapped by the Method caller
      - path: crypto/.*/functions\.go
        linters:
          - wrapcheck
      # extensions_test.go cannot be parallel: tests modify the global methods registry
      - path: crypto/.*/extensions_test\.go
        linters:
          - paralleltest
      # diagnostics/pprof.go intentionally imports net/http/pprof to register debug endpoints
      - path: diagnostics/pprof\.go
        linters:
          - depguard
      # diagnostics/captures.go wraps runtime/pprof — the import is the whole
      # point of the file. wrapcheck: profile.WriteTo returns external errors
      # that ErrCaptureProfile re-wraps into the domain error.
      - path: diagnostics/captures\.go
        linters:
          - depguard
          - wrapcheck
      # diagnostics/captures_test.go: runtime/pprof.Lookup cross-check is
      # intentional; pprofProfileMagic and blockProfileMu are required test
      # globals; CPU/block profile state is process-global so those subtests
      # cannot run in parallel.
      - path: diagnostics/captures_test\.go
        linters:
          - depguard
          - gochecknoglobals
          - paralleltest
          - tparallel
      # diagnostics examples demonstrate pprof capture wrappers and print
      # output for the reader; defers after log.Fatalf are intentional in
      # demo code.
      - path: diagnostics/examples/
        linters:
          - forbidigo
          - gocritic
      # NewOptions has 11 cyclomatic complexity (limit 10); extracting sub-functions hurts readability
      - path: http/options\.go
        linters:
          - cyclop
      # http client singletons (DefaultClient, NoopClient, ErrorClient) are required package-level vars
      # gosec G107: client.Do executes requests with caller-provided URLs by design (not SSRF)
      - path: http/client\.go
        linters:
          - gochecknoglobals
          - contextcheck
          - gosec
          - wrapcheck
      # retry.DoWithData wraps errors internally; Do delegates to DefaultClient
      - path: http/functions\.go
        linters:
          - wrapcheck
      # sentinel errors and type compliance vars are package-level by design
      - path: http/(errors|types)\.go
        linters:
          - gochecknoglobals
      # expressions package: sentinel errors, opSymbols, keywords are package-level by design
      - path: expressions/(errors|types|lexer)\.go
        linters:
          - gochecknoglobals
      # expressions ast/evaluator/parser propagate errors from Expr.Eval without wrapping (by design)
      - path: expressions/(ast|evaluator|parser)\.go
        linters:
          - wrapcheck
      # expressions nolintlint: exhaustive directives are valid for SDK linter config, not common
      - path: expressions/
        linters:
          - nolintlint
      # expressions tests: repeated string literals and staticcheck SA4023 are acceptable
      - path: expressions/.*_test\.go
        linters:
          - goconst
          - staticcheck
      # resilience: registry singletons (DefaultCircuitBreakerRegistry,
      # DefaultRateLimiterRegistry) are required package-level vars; cassert
      # methods inside CircuitBreaker/RateLimiter receive ctx via Execute/Wait
      # but the receiver-nil assertion is a struct invariant, not a context-aware
      # check.
      - path: resilience/(circuit_breaker|rate_limiter|registry_circuit_breaker|registry_rate_limiter)\.go
        linters:
          - gochecknoglobals
          - contextcheck
      # resilience tests intentionally pass nil context to validate guard
      # behavior (staticcheck SA1012) and return nil,nil from disposable
      # closures (nilnil) used only to satisfy func types.
      - path: resilience/.*_test\.go
        linters:
          - staticcheck
          - nilnil
      # resilience examples use fmt.Print* for runnable demonstration output.
      - path: resilience/examples/
        linters:
          - forbidigo
      # validation examples use println for demonstration purposes
      - path: validation/examples/
        linters:
          - forbidigo
