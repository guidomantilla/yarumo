version: "2"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  default: all

  disable:
    - dupl
    - err113
    - exhaustruct
    - godot
    - gomoddirectives
    - iface
    - ireturn
    - lll
    - mnd
    - nlreturn
    - revive
    - tagliatelle
    - testpackage
    - varnamelen
    - whitespace
    - wsl
    - wsl_v5

  settings:
    depguard:
      rules:
        main:
          list-mode: original
          deny:
            # ------------------------------------------------------------------------
            # LOGGING
            # ------------------------------------------------------------------------
            - pkg: "^log$"
              desc: "use log/slog instead of stdlib log"
            - pkg: "github.com/sirupsen/logrus"
              desc: "use log/slog instead of logrus"
            - pkg: "go.uber.org/zap"
              desc: "use log/slog instead of zap"
            - pkg: "github.com/rs/zerolog"
              desc: "use log/slog instead of zerolog"

            # ------------------------------------------------------------------------
            # TESTING
            # ------------------------------------------------------------------------
            - pkg: "github.com/stretchr/testify"
              desc: "use t.Fatal/t.Fatalf instead of testify assertions"

            # ------------------------------------------------------------------------
            # LEGACY ERRORS
            # ------------------------------------------------------------------------
            - pkg: "github.com/pkg/errors"
              desc: "use errs.Wrap(sentinel, err) with a sentinel from errors.go"

            # ------------------------------------------------------------------------
            # DEPRECATED IO
            # ------------------------------------------------------------------------
            - pkg: "io/ioutil"
              desc: "ioutil is deprecated since Go 1.16"

            # ------------------------------------------------------------------------
            # BANNED DEPENDENCIES
            # ------------------------------------------------------------------------
            - pkg: "github.com/spf13/viper"
              desc: "viper is not allowed in security/authz module"

    forbidigo:
      forbid:
        - pattern: ^(fmt\.Print(|f|ln)|fmt\.Fprint(|f|ln)|print|println)$
          msg: "use the project logger (log/slog) instead of direct print statements"

    funlen:
      lines: 220

    exhaustive:
      default-signifies-exhaustive: true

  exclusions:
    rules:
      # Exclude some linters from running on tests files.
      - path: _test\.go
        linters:
          - cyclop
          - errcheck
          - errchkjson
          - errname
          - forbidigo
          - containedctx
          - funlen
          - gocognit
          - gocyclo
          - goconst
          - gosec
          - intrange
          - maintidx
          - noctx
          - nolintlint
          - embeddedstructfieldcheck
          - wrapcheck
          - forcetypeassert
          - govet
          - unparam
          - bodyclose
      # sentinel errors and type compliance vars are package-level by design
      - path: types\.go
        linters:
          - gochecknoglobals
      - path: errors\.go
        linters:
          - gochecknoglobals
      - path: functions\.go
        linters:
          - gochecknoglobals
      # Require* constructors validate policy/action by panicking; this
      # is intentional fail-closed-at-boot per CODING_STANDARDS.
      - path: require_http\.go
        linters:
          - contextcheck
          - wrapcheck
      - path: require_grpc\.go
        linters:
          - contextcheck
          - wrapcheck
      # cassert.NotNil guards receiver invariants (panic on programmer
      # error). It does not consume ctx and is unrelated to context
      # propagation.
      - path: rbac/store\.go
        linters:
          - contextcheck
      # The RBAC package keeps Options state in package-level Options
      # initialized through With* options.
      - path: rbac/types\.go
        linters:
          - gochecknoglobals
      - path: rbac/errors\.go
        linters:
          - gochecknoglobals
      - path: rbac/store\.go
        linters:
          - gochecknoglobals
