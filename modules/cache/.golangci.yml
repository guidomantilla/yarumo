version: "2"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  default: all

  disable:
    - dupl
    - err113
    - exhaustruct
    - godot
    - gomoddirectives
    - iface
    - ireturn
    - lll
    - mnd
    - nlreturn
    - revive
    - tagliatelle
    - testpackage
    - varnamelen
    - whitespace
    - wsl
    - wsl_v5

  settings:
    depguard:
      rules:
        main:
          list-mode: original
          deny:
            # ------------------------------------------------------------------------
            # LOGGING
            # ------------------------------------------------------------------------
            - pkg: "^log$"
              desc: "use log/slog instead of stdlib log"
            - pkg: "github.com/sirupsen/logrus"
              desc: "use log/slog instead of logrus"
            - pkg: "go.uber.org/zap"
              desc: "use log/slog instead of zap"
            - pkg: "github.com/rs/zerolog"
              desc: "use log/slog instead of zerolog"

            # ------------------------------------------------------------------------
            # TESTING
            # ------------------------------------------------------------------------
            - pkg: "github.com/stretchr/testify"
              desc: "use t.Fatal/t.Fatalf instead of testify assertions"

            # ------------------------------------------------------------------------
            # LEGACY ERRORS
            # ------------------------------------------------------------------------
            - pkg: "github.com/pkg/errors"
              desc: "use errs.Wrap(sentinel, err) with a sentinel from errors.go"

            # ------------------------------------------------------------------------
            # DEPRECATED IO
            # ------------------------------------------------------------------------
            - pkg: "io/ioutil"
              desc: "ioutil is deprecated since Go 1.16"

            # ------------------------------------------------------------------------
            # BANNED DEPENDENCIES
            # ------------------------------------------------------------------------
            - pkg: "github.com/spf13/viper"
              desc: "viper is not allowed in cache module"

    forbidigo:
      forbid:
        - pattern: ^(fmt\.Print(|f|ln)|fmt\.Fprint(|f|ln)|print|println)$
          msg: "use the project logger (log/slog) instead of direct print statements"

    funlen:
      lines: 220
      # Backend factories naturally have many short statements because they
      # populate 6 function fields per *cache[K, V] in one place. Bump the
      # statement cap accordingly.
      statements: 60

    cyclop:
      # Backend factories drive 11 branches in newBigcacheCache (3 closures
      # with internal error branches plus the construction switch). Closures
      # are intentionally inline to keep the factory readable.
      max-complexity: 12

    exhaustive:
      default-signifies-exhaustive: true

  exclusions:
    rules:
      # Exclude some linters from running on test files.
      - path: _test\.go
        linters:
          - cyclop
          - errcheck
          - errchkjson
          - errname
          - forbidigo
          - containedctx
          - funlen
          - gocognit
          - gocyclo
          - gosec
          - maintidx
          - noctx
          - wrapcheck
          - forcetypeassert
      # Type compliance vars in types.go
      - path: types\.go
        linters:
          - gochecknoglobals
      # graph.go uses blank imports
      - path: graph\.go
        linters:
          - revive
      # cache.go uses cassert.NotNil which does not accept a context.
      - path: cache\.go
        linters:
          - contextcheck
      # backends.go: newGoCacheCache returns (cache, nil) so its caller can
      # share a single signature with the ristretto/bigcache factories that
      # genuinely return errors. The constant-nil error is intentional.
      - path: backends\.go
        text: "newGoCacheCache - result 1"
        linters:
          - unparam
      # The OTel metrics test mutates the global MeterProvider and cannot be parallel.
      - path: cache_test\.go
        linters:
          - paralleltest
          - tparallel
      # Examples are runnable demos.
      - path: examples/
        linters:
          - forbidigo
          - gochecknoglobals
          - gochecknoinits
          - errcheck
          - wrapcheck
          - noctx
          - gosec
          - funlen
          - mnd
          - lll
          - gocyclo
          - maintidx
